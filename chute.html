<!DOCTYPE html>
<html>
<head>
  <title>Chute d'une bille avec frottement</title>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.4.0/lib/p5.min.js"></script>
</head>
<body>

<h1>Chute d'une bille dans un fluide avec frottement</h1>

<script>
let y = 50;          // position verticale
let v = 0;           // vitesse initiale
let g = 0.5;         // gravité
let k = 0.05;        // coefficient de frottement
let dt = 1;          // pas de temps
let vitesseData = []; // stocker les vitesses pour tracer la courbe
let maxV = 20;       // vitesse max pour l'affichage graphique

function setup() {
  createCanvas(700, 400);
  frameRate(60);
}

function draw() {
  background(240);

  // ---- Calcul physique avec frottement ----
  let a = g - k * v * abs(v); // frottement proportionnel à v^2
  v += a * dt;
  y += v * dt;

  vitesseData.push(v);

  // ---- Dessiner la bille ----
  fill(255, 0, 0);
  ellipse(width/4, y, 30, 30);

  // ---- Axe vertical (OZ) ----
  stroke(0);
  line(width/4, 0, width/4, height);

  // ---- Tracé de la courbe v=f(t) ----
  stroke(0, 0, 255);
  noFill();
  beginShape();
  for (let i = 0; i < vitesseData.length; i++) {
    let vx = map(i, 0, vitesseData.length, width/2, width-20);
    let vy = map(vitesseData[i], 0, maxV, height-20, 20); // mettre échelle
    vertex(vx, vy);
  }
  endShape();

  // ---- Afficher la vitesse et position ----
  noStroke();
  fill(0);
  textSize(16);
  text("Vitesse : " + v.toFixed(2) + " px/frame", 20, 20);
  text("Position : " + y.toFixed(2) + " px", 20, 40);

  // ---- Réinitialiser si la bille sort ----
  if (y > height) {
    y = 50;
    v = 0;
    vitesseData = [];
  }
}
</script>

</body>
</html>
