<!DOCTYPE html>
<html>
<head>
  <title>Chute d'une bille dans un tube avec axes</title>
  <script src="https://cdn.jsdelivr.net/npm/p5@1.4.0/lib/p5.min.js"></script>
</head>
<body>

<h1>Simulation : Bille dans un fluide avec courbe v=f(t)</h1>

<script>
let y = 50;          // position verticale de la bille
let v = 0;           // vitesse initiale
let g = 0.5;         // gravité
let k = 0.05;        // frottement fluide
let dt = 1;          // pas de temps
let vitesseData = []; // tableau pour tracer v=f(t)
let maxV = 20;        // vitesse max pour l'affichage graphique

// dimensions du tube
let tubeX = 100;
let tubeY = 50;
let tubeWidth = 60;
let tubeHeight = 300;

function setup() {
  createCanvas(800, 400);
  frameRate(60);
}

function draw() {
  background(240);

  // ---- Calcul physique avec frottement v^2 ----
  let a = g - k * v * abs(v);
  v += a * dt;
  y += v * dt;

  vitesseData.push(v);

  // ---- Dessiner le tube et le fluide ----
  fill(200, 220, 255, 150); // couleur fluide
  rect(tubeX, tubeY, tubeWidth, tubeHeight);

  // ---- Dessiner la bille ----
  fill(255, 0, 0);
  ellipse(tubeX + tubeWidth/2, y, 30, 30);

  // ---- Afficher les axes de la courbe v=f(t) ----
  stroke(0);
  line(width/2, 20, width/2, height-20); // axe Y
  line(width/2, height-20, width-20, height-20); // axe X

  // ---- Noms des axes ----
  noStroke();
  fill(0);
  textSize(14);
  textAlign(CENTER);
  text("Temps t (frames)", (width/2 + width-20)/2, height-5); // axe X
  push();
  translate(width/2 - 40, height/2);
  rotate(-HALF_PI);
  text("Vitesse v (px/frame)", 0, 0); // axe Y
  pop();

  stroke(0);
  // graduations axe Y (vitesse)
  for (let i = 0; i <= 10; i++) {
    let vy = map(i*2, 0, maxV, height-20, 20);
    line(width/2 - 5, vy, width/2 + 5, vy);
    noStroke();
    fill(0);
    textSize(12);
    text(i*2, width/2 - 25, vy+5);
    stroke(0);
  }

  // ---- Tracer la courbe vitesse ----
  stroke(0, 0, 255);
  noFill();
  beginShape();
  for (let i = 0; i < vitesseData.length; i++) {
    let vx = map(i, 0, vitesseData.length, width/2 + 10, width-20);
    let vy = map(vitesseData[i], 0, maxV, height-20, 20);
    vertex(vx, vy);
  }
  endShape();

  // ---- Afficher vitesse et position ----
  noStroke();
  fill(0);
  textSize(16);
  text("Vitesse : " + v.toFixed(2) + " px/frame", 20, 20);
  text("Position : " + y.toFixed(2) + " px", 20, 40);

  // ---- Réinitialiser si la bille sort ----
  if (y > tubeY + tubeHeight) {

<p id="resultat"></p>

<script>

  let r = "";
  if(document.getElementById("q1").value.toLowerCase().includes("limite") ||

       r += "Q1 correct !<br>";

}
</script>

</body>
</html>
